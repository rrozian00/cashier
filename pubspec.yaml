name: cashier
description: "POS app."

publish_to: "none"

version: 3.0.0+10

environment:
  sdk: ^3.6.1

dependencies:
  bloc: ^9.2.1
  cloud_firestore: ^6.5.0
  collection: ^1.19.0
  connectivity_plus: ^7.1.1
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  equatable: ^2.0.7
  esc_pos_utils_plus: ^2.0.4
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_image_compress: ^2.4.0
  flutter_launcher_icons: ^0.14.3
  flutter_localization: ^0.4.0
  get_it: ^9.2.1
  google_fonts: ^8.1.0
  google_nav_bar: ^5.0.7
  haptic_feedback: ^0.6.4+3
  http: ^1.3.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  mobile_scanner: ^7.2.0
  mocktail: ^1.0.4
  package_info_plus: ^9.0.1
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  print_bluetooth_thermal: ^1.1.6
  shared_preferences: ^2.5.2
  supabase_flutter: ^2.9.1
  top_snackbar_flutter: ^3.3.0
  vibration: ^3.1.8

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 23

flutter:
