name: cashier
description: "POS App."
publish_to: "none"

version: 3.0.0+10

environment:
  sdk: ^3.6.1

dependencies:
  cloud_firestore: ^5.6.3
  collection: ^1.19.0
  crypto: ^3.0.6
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  equatable: ^2.0.7
  esc_pos_utils_plus: ^2.0.4
  firebase_auth: ^5.2.0
  firebase_core: ^3.11.0
  flutter:
    sdk: flutter
  flutter_image_compress: ^2.4.0
  flutter_launcher_icons: ^0.14.3
  flutter_localization: ^0.3.1
  get: ^4.7.3
  google_fonts: ^6.2.1
  google_nav_bar: ^5.0.7
  http: ^1.3.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  mobile_scanner: ^6.0.7
  mocktail: ^1.0.4
  package_info_plus: ^8.3.0
  path: ^1.9.0
  path_provider: ^2.1.5
  permission_handler: ^11.4.0
  print_bluetooth_thermal: ^1.1.6
  shared_preferences: ^2.5.2
  sqflite: ^2.4.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
